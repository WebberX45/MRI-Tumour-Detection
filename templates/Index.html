<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRI Tumor Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-dark">
    <div class = "container">
        <div class="heading_main">
            <h1 class="display text-center text-white fw-bold">
                MRI Tumor Detection AI
            </h1>
            <p class="text-center text-light">
                Upload an MRI scan and let AI analyze it instantly
            </p>
        </div>

        <!-- File Upload Form -->
        <div class="card shadow p-4 mt-4">
            <form method="POST" enctype="multipart/form-data" id="uploadForm">

                <div class="mb-3">
                    <label for="file" class="form-label">Select MRI Image:</label>
                    <input type="file" class="form-control" id="file" name="file" accept="image/*" required>
                </div>

                <button type="submit" class="btn btn-primary">Upload and Detect</button>

                <!-- ✅ Loading Animation -->
                <div id="loading" style="display:none; text-align:center; margin-top:15px;">
                    <div class="spinner-border text-light" role="status"></div>
                    <p class="text-light mt-2">Analyzing MRI...</p>
                </div>
            </form>
        </div>

        {% if result %}
        <!-- Display Results -->
        <div id="results" class="mt-4">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="{% if 'No Tumor' in result %}text-success{% else %}text-danger{% endif %} fw-bold text-center">
                        {{ result }}
                    </h2>
                    <div class="row mt-4 text-center">

                        <!-- ✅ If NO heatmap → center image -->
                        {% if not heatmap_path %}
                        <div class="col-md-12 d-flex justify-content-center">
                            <div>
                                <h5 class="text-info">Original MRI</h5>
                                <img src="{{ file_path }}" class="img-fluid shadow-lg">
                            </div>
                        </div>
                        {% else %}

                        <!-- ✅ If heatmap exists → side-by-side -->
                        <div class="col-md-6">
                            <h5 class="text-info">Original MRI</h5>
                            <img src="{{ file_path }}" class="img-fluid shadow-lg">
                        </div>

                        <div class="col-md-6">
                            <h5 class="text-warning">AI Heatmap</h5>
                            <img src="{{ heatmap_path }}" class="img-fluid shadow-lg">
                        </div>

                        {% endif %}

                    </div>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const form = document.getElementById("uploadForm");
        const loading = document.getElementById("loading");

        form.addEventListener("submit", function() {
            loading.style.display = "block";
        });
    });
    </script>

</body>

</html>
