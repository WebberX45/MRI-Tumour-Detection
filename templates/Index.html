<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRI Tumor Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-dark">
    <div class = "container">
        <div class="heading_main">
            <h1 class="display" align="center" ><span style="color: white;">MRI Tumor Detecting System</span></h1>
            <p class = "main_heading_para" align="center"><span style="color: white;">Kindly upload the MRI Scan to check whether there is Brain Tumor or not...</span></p>
        </div>

        <!-- File Upload Form -->
        <div class="card shadow p-4 mt-4">
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="file" class="form-label">Select MRI Image:</label>
                    <input type="file" class="form-control" id="file" name="file" accept="image/*" required>
                </div>
                <button type="submit" class="btn btn-primary">Upload and Detect</button>
            </form>
        </div>

        {% if result %}
        <!-- Display Results -->
        <div id="results" class="mt-4">
            <div class="card shadow">
                <div class="card-body">
                    <h4 class="card-title {% if 'No Tumor' in result %}text-success{% else %}text-danger{% endif %}">
                        {{ result }}
                    </h4>
                    <div class="row mt-4">
                        <div class="col-md-6">
                            <h5 class="text-white">MRI Scan</h5>
                            <img src="{{ file_path }}" class="img-fluid">
                        </div>

                        {% if heatmap_path %}
                        <div class="col-md-6">
                            <h5 class="text-white">Tumor Heatmap</h5>
                            <img src="{{ heatmap_path }}" class="img-fluid">
                        </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
</body>

</html>
